# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bluehat-vapor
description: Steam OS, but not Steam OS, is blue-like only.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    packages:
      - gamescope
      - steam
      - xorg-x11-server-Xwayland
      - greetd

  - type: systemd
    system:
      enabled:
        - greetd.service

  - type: signing
