# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: vapor
description: Blue like Steam, but light as vapor.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        # core
        - gamescope
        - steam
        - xorg-x11-server-Xwayland
        - greetd
        # net
        - bluez
        - NetworkManager-wifi
        - NetworkManager-libnm
        # fonts
        - google-noto-sans-fonts
        - dejavu-sans-fonts
        - exfatprogs
        - ntfs-3g
        # drivers 
        - mesa-dri-drivers
        - mesa-vulkan-drivers
        - vulkan-loader

  - type: systemd

    system:
      enabled:
        - greetd.service
        - bluetooth.service
        - NetworkManager.service
      
  - type: script
    snippets:
      - "passwd -d gamer"
      - "systemctl disable ModemManager.service sshd.service thermald.service geoclue.service iio-sensor-proxy.service switcheroo-control.service bolt.service || true"
  
          
