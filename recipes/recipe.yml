# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: vapor
description: Blue like Steam, but light as vapor.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      install-weak-deps: false

      packages:
        # core
        - xorg-x11-server-Xwayland
        - initial-setup-gui
        - lightdm
        - lightdm-gtk-greeter
        - accountsservice
        - steam
        - gamescope
        # net
        - bluez
        - NetworkManager-wifi
        - NetworkManager-libnm
        # filesystem & fonts
        - google-noto-sans-fonts
        - dejavu-sans-fonts
        - exfatprogs
        - ntfs-3g
        # drivers
        - mesa-dri-drivers
        - mesa-vulkan-drivers
        - vulkan-loader
        - virglrenderer


  - type: systemd
    system:
      enabled:
        - initial-setup.service
        - lightdm.service
        - bluetooth.service
        - NetworkManager.service

  - type: script
    scripts:
      - cleanup.sh
