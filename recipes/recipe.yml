# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: vapor
description: Blue like Steam, but light as vapor.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        # core
        - xorg-x11-server-Xwayland
        - gamescope
        - greetd
        # net
        - bluez
        - NetworkManager-wifi
        - NetworkManager-libnm
        # filesystem & fonts
        - google-noto-sans-fonts
        - dejavu-sans-fonts
        - exfatprogs
        - ntfs-3g
        # drivers
        - mesa-dri-drivers
        - mesa-vulkan-drivers
        - vulkan-loader


  - type: systemd
    system:
      enabled:
        - greetd.service
        - bluetooth.service
        - NetworkManager.service
        - install-flatpaks-firstboot.service
  - type: script
    scripts:
      - group-add.sh
      - service-disable.sh
