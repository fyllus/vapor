# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: vapor
description: Blue like Steam, but light as vapor.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        # core
        - xorg-x11-server-Xwayland
        - gnome-initial-setup
        - gdm
        - steam
        - gamescope
        # net
        - bluez
        - NetworkManager-wifi
        - NetworkManager-libnm
        # filesystem & fonts
        - google-noto-sans-fonts
        - dejavu-sans-fonts
        - exfatprogs
        - ntfs-3g
        # drivers
        - mesa-dri-drivers
        - mesa-vulkan-drivers
        - vulkan-loader
        - virglrenderer


  - type: systemd
    system:
      enabled:
        - gdm.service
        - bluetooth.service
        - NetworkManager.service

  - type: script
    scripts:
      - service-disable.sh
